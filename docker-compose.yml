services:
  postgres:
    image: postgres:16-alpine
    container_name: medusa_postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: medusa
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: ${DB_PASSWORD}
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 10s
      timeout: 5s
      retries: 10

  redis:
    image: redis:7-alpine
    container_name: medusa_redis
    restart: unless-stopped

  medusa:
    build: .
    container_name: medusa_backend
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_started
    ports:
      - "9000:9000"
    environment:
      NODE_ENV: production
      # Drop per-request HTTP access logs (Medusa default LOG_LEVEL is "http").
      LOG_LEVEL: "info"
      DATABASE_URL: "postgres://postgres:${DB_PASSWORD}@medusa_postgres:5432/medusa"
      REDIS_URL: "redis://medusa_redis:6379"
      JWT_SECRET: "${JWT_SECRET}"
      COOKIE_SECRET: "${COOKIE_SECRET}"
      STORE_CORS: "${STOREFRONT_URL}"
      ADMIN_CORS: "${ADMIN_CORS}"
      AUTH_CORS: "${ADMIN_CORS}"
      BACKEND_URL: "${BACKEND_URL}"
      STRIPE_API_KEY: "${STRIPE_API_KEY}"
      STRIPE_WEBHOOK_SECRET: "${STRIPE_WEBHOOK_SECRET}"
      RESEND_API_KEY: "${RESEND_API_KEY}"
      RESEND_FROM: "${RESEND_FROM}"
      ROYALMAIL_API_KEY: "${ROYALMAIL_API_KEY}"
      RESEND_AUDIENCE_ID: "${RESEND_AUDIENCE_ID}"
      RESEND_MARKETING_FROM: "${RESEND_MARKETING_FROM}"
      PAYPAL_CLIENT_ID: "${PAYPAL_CLIENT_ID}"
      PAYPAL_CLIENT_SECRET: "${PAYPAL_CLIENT_SECRET}"
      NODE_OPTIONS: "--max-old-space-size=3072"
      MEDUSA_ADMIN_EMAIL: "${MEDUSA_ADMIN_EMAIL}"
      MEDUSA_ADMIN_PASSWORD: "${MEDUSA_ADMIN_PASSWORD}"
      MEDUSA_FILE_BACKEND_URL: "${MEDUSA_FILE_BACKEND_URL}"
      # Absolute upload dir, pinned to the volume mount below so it's mode-independent.
      MEDUSA_UPLOAD_DIR: "/server/apps/backend/static"

    volumes:
      # Persist locally-uploaded product images across redeploys.
      # Path MUST equal MEDUSA_UPLOAD_DIR above.
      - medusa_uploads:/server/apps/backend/static

    networks:
      - default
      - dokploy-network

volumes:
  pgdata:
  medusa_uploads:

networks:
  dokploy-network:
    external: true
  default:
    driver: bridge
